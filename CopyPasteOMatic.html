    <style>
		body {font-family: sans-serif}
		h1, h2, h3, noscript, form {text-align: center}
		.button, .inputButton {
 			 background-color: #555555;
 			 border: none;
 			 color: white;
 			 padding: 5px 10px;
 			 text-align: center;
 			 text-decoration: none;
 			 display: inline-block;
 			 border-radius: 4px;
 		}
 		.button:hover {
 			 background-color: #999999;
 		}
 		textarea {
			width: 90%;
			border: 2px solid black;
			border-radius: 4px;
		}
		
		div.inputArea {
		    width:60%;  
            float:left;
		}
		
		/* Dropdown menu */
		div.selector {
			padding: 5px 10px;
		}
		
		/* End dropdown menu */
		
		div.section {
			width: 90%;
			/*border: 1px solid black;*/
			padding: 5px 10px;
		}
		
		div.sectionTitle {
			font-weight: bold;
		}
		
		div.outputArea {
		    width:40%;  
            float:left;
		}
		
		div.outputButtonArea {
			text-align: center;
			padding: 5px 10px;
		}
		
		div.messages {
			width: 90%;
			color: red;
			text-align: center;
 			text-decoration: none;
 			display: inline-block;
 			opacity: 1;
		}
		
		.fade-out {
  			opacity: 0;
  			transition: opacity 2s ease;
		}

		/* Tooltips */
		.tooltip {
		  position: relative;
		  display: inline-block;
		  /*border-bottom: 1px dotted black;*/
		}

		.tooltip .tooltiptext {
		  visibility: hidden;
		  width: 120px;
		  background-color: #555;
		  color: #fff;
		  text-align: center;
		  border-radius: 6px;
		  padding: 5px 0;
		  position: absolute;
		  z-index: 1;
		  bottom: -125%;
		  left: 80%;
		  margin-left: -60px;
		  opacity: 0;
		  transition: opacity 0.3s;
		}

		.tooltip .tooltiptext::after {
		  content: "";
		  position: absolute;
		  top: 100%;
		  left: 50%;
		  /* items below add a little triangle */
		  /*margin-left: -5px;
		  border-width: 5px;
		  border-style: solid;
		  border-color: #555 transparent transparent transparent;*/
		}

		.tooltip:hover .tooltiptext {
		  visibility: visible;
		  opacity: 1;
		}
		
		/* End tooltips */
		
	</style>

	<script>
	
	// Check for presence of external config file
	const script = document.createElement("script");
		script.src = "config.js";

		// If loads successfully, generate the input form
		script.onload = () => {
		  console.log("Script loaded successfully");
		  generateInputForm()
		};

		// If fails to load, display error
		script.onerror = () => {
		  console.error("Script failed to load");
		  const errorMessage = document.createElement("div");
	  	  errorMessage.innerHTML = "The configuration file (config.js) is missing!";
	  	  errorMessage.style.color = "#555555";
          document.getElementById("inputButtonArea").appendChild(errorMessage);
		};

		document.head.appendChild(script);

	  /*function fileLoadError() {
		
		console.error("Failed to load config.js");
        alert("Error: Required script failed to load.");
        
        const errorMessage = document.createElement("div");
	  	errorMessage.innerHTML = "The configuration file (config.js) is missing";
        document.getElementById("inputButtonArea").appendChild(errorMessage);
		
	  }*/
		
		 
	  function generateInputForm() {
	  
	  	// configInfo will be an array stored in external config.js file
		
		console.log("Config is: " + configInfo);
		console.log("Brand colour is: " + brandColor);
		console.log("Brand text colour is: " + brandTextColor);
		
	  	// Creates a section for each 1st order element in the config array
	  	for (let i=0; i<configInfo.length; i++) {
	  	
	  		const sectn = document.createElement("div");
	  		sectn.innerHTML = configInfo[i][0]; // 1st order element 1 is section name
	  		sectn.classList.add("sectionTitle");
	  		sectn.style.margin = '5px';
	  		document.getElementById("inputButtonArea").appendChild(sectn);
	  	
	  		// Creates a button for each 2nd order element in the config array
	  		for (let j=1; j<configInfo[i].length; j++) {
	  		
	  			const btnContainer = document.createElement("div");
	  			btnContainer.classList.add("tooltip");
	  			
	  			const btnTooltip = document.createElement("span");
	  			btnTooltip.classList.add("tooltipText");
	  			btnTooltip.innerHTML = configInfo[i][j][1];
	  			btnTooltip.style.visibility = "hidden";
	  			btnTooltip.style.position = "absolute";
	  			
	  			// TODO: fix tooltips not appearing correctly
	  			
	    		const btn = document.createElement("button");
				btn.innerHTML = configInfo[i][j][0]; // 3rd order element 1 is button text
				btn.classList.add("inputButton");
				btn.onclick = function() {
   					addText(configInfo[i][j][1]); //3rd order element 2 is text to copy
				};
				btn.style.backgroundColor = brandColor;
				btn.style.color = brandTextColor;
				btn.style.border = "none";
				btn.style.padding = "5px";
				btn.style.borderRadius = "4px";
				btn.style.margin = "5px";
 			    btn.style.display = "inline-block";
				
				btnContainer.appendChild(btn);
				btnContainer.appendChild(btnTooltip);
				
				document.getElementById("inputButtonArea").appendChild(btnContainer);
				
			}
		
		}
	  	    
	    //TODO: generates different content based on drop-down workflow selector
	  
	  }
	  
	  function addText(snippet) {
	  
	    // Get existing text field
	    var existingText = document.getElementById("outputBox").value;
	    
	    // Append the snippet and output back to the text field
	    document.getElementById("outputBox").value = existingText + snippet;
	  
	  }
	
	  function copyText() {
        // Get the text field
        var copyText = document.getElementById("outputBox");

        // Select the text field
        copyText.select();
        copyText.setSelectionRange(0, 99999); // For mobile devices

        // Copy the text inside the text field
        navigator.clipboard.writeText(copyText.value);

        // Alert the copied text
        //alert("Copied the text: " + copyText.value);
        
        // Display confirmation message below button, that fades
        // Delete existing messages first
        const list = document.getElementById("messageArea");
		while (list.hasChildNodes()) {
		  list.removeChild(list.firstChild);
		}
		// Now create new message
        const successMessage = document.createElement("div");
	  	successMessage.innerHTML = "Text copied!";
	  	successMessage.style.color = brandColor;
        document.getElementById("messageArea").appendChild(successMessage);
        setTimeout(() => {
  			successMessage.classList.add("fade-out");
		}, 10);
        
	  } 
	
	  function clearText() {
	    document.getElementById("outputBox").value = "";
	    document.getElementById("messageArea").innerHTML = "";
	    
	    //TODO: add confirmation before clearing text to prevent accidental deletion
	  }
	
	</script>
