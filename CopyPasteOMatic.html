	<script>
	
	  function copyText() {
        // Get the text field
        var copyText = document.getElementById("outputBox");

        // Select the text field
        copyText.select();
        copyText.setSelectionRange(0, 99999); // For mobile devices

        // Copy the text inside the text field
        navigator.clipboard.writeText(copyText.value);

        // Alert the copied text
        //alert("Copied the text: " + copyText.value);
        
        //TODO: add confirmation message in text below button
	  } 
	
	  function clearText() {
	    document.getElementById("outputBox").value = "";
	    
	    //TODO: add confirmation before clearing text to prevent accidental deletion
	  }
	  
	  function generateInputForm(configInfo) {
	  
		// configInfo will be an array
	  
	    //TODO: dynamically generates sections with buttons and custom copiable text per button
	    
	    //TODO: generates different content based on workflow selector
	  
	  }
	  
	  function addText(snippet) {
	  
	    // Get existing text field
	    var existingText = document.getElementById("outputBox").value;
	    
	    // Append the snippet and output back to the text field
	    document.getElementById("outputBox").value = existingText + snippet;
	  
	  }
	
	</script>

	<style>
		body {font-family: sans-serif}
		h1, h2, h3, noscript, form {text-align: center}
		.button, .inputButton {
 			 background-color: #555555;
 			 border: none;

 			 padding: 5px 10px;
 			 text-align: center;

 			 display: inline-block;
 			 border-radius: 4px;

		}

		}

		}

            float:left;
		}
		
		div.outputButtonArea {

		}
		
		/* Tooltips */
		.tooltip {
		  position: relative;
		  display: inline-block;
		  /*border-bottom: 1px dotted black;*/
		}

		.tooltip .tooltiptext {
		  visibility: hidden;
		  width: 120px;
		  background-color: #555;
		  color: #fff;
		  text-align: center;
		  border-radius: 6px;
		  padding: 5px 0;
		  position: absolute;
		  z-index: 1;
		  bottom: -125%;
		  left: 80%;
		  margin-left: -60px;
		  opacity: 0;
		  transition: opacity 0.3s;
		}

		.tooltip .tooltiptext::after {
		  content: "";
		  position: absolute;
		  top: 100%;
		  left: 50%;
		  /* items below add a little triangle */
		  /*margin-left: -5px;
		  border-width: 5px;
		  border-style: solid;
		  border-color: #555 transparent transparent transparent;*/
		}

		.tooltip:hover .tooltiptext {
		  visibility: visible;
		  opacity: 1;
		}
		
		/* End tooltips */
		
	</style>

  </head>
